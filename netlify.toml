[build]
  command = "npm run build"
  publish = "dist"

# Optional: set after creating/linking your Netlify site.
# site_id = "YOUR_NETLIFY_SITE_ID"

# Keep secrets out of this file and set them in Netlify UI or shell env vars.
[build.environment]
  NODE_VERSION = "22"

# SPA routing fallback for React Router.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
