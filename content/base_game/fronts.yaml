fronts:
  - id: WAR
    name: War & Conflict
    collapse_thresholds:
      - condition: "front.impact >= 10"
        result: GLOBAL_LOSS
    coupling_rules:
      - trigger: "front.pressure >= 8"
        effects:
          - log: { emoji: "🛡️", message: "War pressure spiked! Generating displacement tokens." }
          - add_token: { region: MENA, token_type: displacement, count: 2 }
          - modify_track: { target: global.RIGHTS.impact, delta: 1, clamp: {min:0, max:10} }
          - modify_track: { target: global.POVERTY.pressure, delta: 1, clamp: {min:0, max:10} }

  - id: CLIMATE
    name: Climate Crisis
    collapse_thresholds:
      - condition: "front.impact >= 10"
        result: GLOBAL_LOSS

  - id: RIGHTS
    name: Human Rights
    collapse_thresholds:
      - condition: "front.protection <= 0 and front.impact >= 10"
        result: GLOBAL_LOSS

  - id: SPEECH_INFO
    name: Speech & Information
    collapse_thresholds:
      - condition: "front.impact >= 10"
        result: GLOBAL_LOSS

  - id: POVERTY
    name: Economic Poverty
    collapse_thresholds:
      - condition: "front.impact >= 10"
        result: GLOBAL_LOSS
    coupling_rules:
      - trigger: "front.pressure >= 7"
        effects:
          - log: { emoji: "🛰️", message: "Poverty pressure increasing disinformation effectiveness." }
          # In the MVP this might just add a disinfo token
          - add_token: { region: ANY, token_type: disinformation, count: 1 }

  - id: ENERGY
    name: Energy Access
    collapse_thresholds:
      - condition: "front.impact >= 10"
        result: GLOBAL_LOSS

  - id: CULTURE
    name: Art & Culture
    collapse_thresholds:
      - condition: "front.impact >= 10"
        result: GLOBAL_LOSS
    coupling_rules:
      - trigger: "front.pressure >= 8"
        effects:
          - log: { emoji: "🎭", message: "Culture is under attack. Solidarity creation reduced." }
