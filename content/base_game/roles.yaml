roles:
  - id: organizer
    name: Organizer
    base_actions_per_turn: 2
    burnout_max: 5
    burnout_strained_threshold: 3
    passive: "Generates 1 Solidarity per turn automatically."
    unique_actions:
      - id: mutual_aid_network
        name: Mutual Aid Network
        description: Spend 2 Solidarity to reduce 1 Pressure on POVERTY front.
        effects:
          - modify_track:
              target: fronts.POVERTY.pressure
              delta: -1
              clamp: {min: 0, max: 10}
    breakthrough_action:
      id: mass_mobilization
      name: Mass Mobilization
      description: Costs 2 Burnout. Reduce 2 Pressure on any Front.
      burnout_cost: 2
      effects:
        - choice:
            prompt: Choose a Front to mass mobilize
            options:
              - label: WAR
                effects: [{ modify_track: { target: fronts.WAR.pressure, delta: -2, clamp: {min:0, max:10} } }]
              - label: CLIMATE
                effects: [{ modify_track: { target: fronts.CLIMATE.pressure, delta: -2, clamp: {min:0, max:10} } }]
              - label: POVERTY
                effects: [{ modify_track: { target: fronts.POVERTY.pressure, delta: -2, clamp: {min:0, max:10} } }]

  - id: investigative_journalist
    name: Investigative Journalist
    base_actions_per_turn: 2
    burnout_max: 5
    burnout_strained_threshold: 3
    passive: "Generates 1 Evidence per turn automatically. Ignores 1 Censorship constraint."
    unique_actions:
      - id: expose_corruption
        name: Expose Corruption
        description: Spend 1 Evidence to remove 1 Disinformation token.
        effects:
          - choice:
              prompt: Choose a region to remove a Disinfo token
              # Wait, choices can also be dynamic but we'll hardcode one example for the MVP
              options:
                - label: MENA
                  effects: [{ remove_token: { region: MENA, token_type: disinformation, count: 1 } }]
    breakthrough_action:
      id: coordinated_leak
      name: Coordinated Leak
      description: Costs 2 Burnout. Reduce 1 Control lock globally.
      burnout_cost: 2
      effects:
        # Example global effect
        - remove_lock: { region: ANY, lock_type: censorship, count: 1 }

  - id: human_rights_lawyer
    name: Human Rights Lawyer
    base_actions_per_turn: 2
    burnout_max: 5
    burnout_strained_threshold: 3
    passive: "Starts with 1 extra Evidence. Aid corridor actions cost 1 less action point."
    unique_actions:
      - id: injunction
        name: Injunction
        description: Spend 2 Evidence to increase Protection on RIGHTS by 1.
        effects:
          - modify_track:
              target: fronts.RIGHTS.protection
              delta: 1
              clamp: {min: 0, max: 10}
      - id: negotiate_access
        name: Negotiate Access
        description: Spend 1 Solidarity to remove an aid access lock.
        effects:
          - choice:
              prompt: Choose region to remove access lock
              options:
                - label: MENA
                  effects: [{ remove_lock: { region: MENA, lock_type: aid_access } }]
    breakthrough_action:
      id: international_tribunal
      name: International Tribunal
      description: Costs 2 Burnout. Add 1 Progress to Charter if prerequisites are met.
      burnout_cost: 2
      effects:
        - add_token: { target: global, token_type: charter_progress, count: 1 }

  - id: climate_energy_planner
    name: Climate Energy Planner
    base_actions_per_turn: 2
    burnout_max: 5
    burnout_strained_threshold: 3
    passive: "Generates 1 Capacity per turn automatically."
    unique_actions:
      - id: build_infrastructure
        name: Build Resilience
        description: Spend 2 Capacity to increase ENERGY protection by 1.
        effects:
          - modify_track:
              target: fronts.ENERGY.protection
              delta: 1
              clamp: {min: 0, max: 10}
    breakthrough_action:
      id: rapid_decarbonization
      name: Rapid Decarbonization
      description: Costs 2 Burnout. Delay the Climate Clock by 1.
      burnout_cost: 2
      effects:
        - modify_track:
            target: global.temperature
            delta: -1
            clamp: {min: 0, max: 10}
