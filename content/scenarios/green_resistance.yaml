scenario:
  id: green_resistance
  name: "Green Resistance"
  introduction: |
    Beyond the cities, a different kind of war is being fought. 
    The "Green Resistance" explores the struggle for land and life in the Amazon and Sub-Saharan Africa. 
    Can you protect the last lungs of the Earth against corporate-driven extraction?
  story: |
    "They come at night, with machines that sound like thunder," the elder whispered. 
    The jungle, once alive with a thousand voices, is becoming a graveyard of ancient giants. 
    But the roots hold deep. And they are whispering to us. 
    We will not just watch. We will stand with the green.
  description: "Protecting indigenous land rights and stopping illegal extraction in forest biomes."
  
  initial_state:
    temperature: 3
    civic_space: REPRESSED
    resources:
      solidarity: 4
      evidence: 1
      capacity: 2
    
    regions:
      SubSaharanAfrica:
        vulnerability:
          CLIMATE: 3
          POVERTY: 2
        starting_tokens:
          - { type: extraction, count: 2 }
      LatinAmerica:
        vulnerability:
          CLIMATE: 2
          SPEECH_INFO: 3
        starting_tokens:
          - { type: resistance, count: 1 }
    
    fronts:
      WAR: { pressure: 2, protection: 4, impact: 2 }
      CLIMATE: { pressure: 7, protection: 1, impact: 5 }
      RIGHTS: { pressure: 6, protection: 2, impact: 3 }
      POVERTY: { pressure: 4, protection: 3, impact: 2 }
      ENERGY: { pressure: 5, protection: 2, impact: 4 }
      CULTURE: { pressure: 3, protection: 4, impact: 2 }
  
  special_rules:
    - id: root_solidarity
      name: "Root Solidarity"
      trigger: "action.resolve and action.id == 'reforest'"
      condition: "region.id == 'LatinAmerica'"
      effects:
        - log: { emoji: "🌿", message: "Root Solidarity: Reforestation efforts gained extra protection." }
